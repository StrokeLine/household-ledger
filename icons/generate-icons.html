<!DOCTYPE html>
<html>
<head><title>아이콘 생성기</title></head>
<body>
<p>아래 캔버스를 우클릭하여 이미지를 저장하세요</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  var ctx = canvas.getContext('2d');
  var s = canvas.width;
  // 배경
  ctx.fillStyle = '#5380EA';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.18);
  ctx.fill();
  // 텍스트
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold ' + (s * 0.4) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💰', s/2, s/2);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
